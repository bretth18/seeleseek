name: CodeQL

on:
  push:
    branches: [main]
  schedule:
    # Monday 04:23 UTC. Catches drift if a commit lands on main without
    # going through the push trigger (e.g., a force-push or an admin
    # bypass) and gives us one scheduled run per week regardless.
    - cron: '23 4 * * 1'

permissions:
  security-events: write
  contents: read
  actions: read

jobs:
  analyze:
    name: CodeQL (Swift)
    # macos-26 is the runner image the app is verified against. Keep in
    # sync with .github/workflows/build.yml — bump both together.
    runs-on: macos-26
    # Source-mode extraction (no build tracer) finishes in ~10-15 min on
    # this runner. 45 is a generous ceiling that still catches a real
    # hang rather than burning macOS-minutes indefinitely.
    timeout-minutes: 45

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Initialize CodeQL
        uses: github/codeql-action/init@v4
        with:
          languages: swift
          # `build-mode: none` runs CodeQL's Swift extractor over the
          # source tree without wrapping a compiler build. Manual mode
          # was tried first: under CodeQL's build tracer, `xcodebuild`
          # for this project (app target + SPM package + @Observable
          # macros) exceeded a 60-minute wall and the job timed out on
          # every run. The full-build cost isn't worth paying — the
          # queries that really need cross-module data-flow (taint
          # tracking across package boundaries) aren't the ones finding
          # bugs in a native macOS client; the security-pattern queries
          # CodeQL runs (path traversal, insecure randomness, hardcoded
          # credentials, regex DoS, etc.) all work from source alone.
          build-mode: none

      - name: Perform CodeQL Analysis
        uses: github/codeql-action/analyze@v4
        with:
          category: "/language:swift"
