<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<style>
  body {
    font-family: -apple-system, BlinkMacSystemFont, "Helvetica Neue", sans-serif;
    font-size: 13px;
    line-height: 1.5;
    color: #1d1d1f;
    margin: 0;
    padding: 0;
  }
  h1 {
    font-size: 18px;
    font-weight: 600;
    margin: 0 0 10px 0;
  }
  p {
    margin: 0 0 10px 0;
  }
  .muted {
    color: #86868b;
    font-size: 11px;
    margin-top: 18px;
  }
  a { color: #0066cc; text-decoration: none; }
  a:hover { text-decoration: underline; }
  @media (prefers-color-scheme: dark) {
    body { color: #f5f5f7; }
    .muted { color: #a1a1a6; }
    a { color: #2997ff; }
  }
</style>
</head>
<body>
  <h1>SeeleSeek is installed</h1>
  <p>Launch it from your Applications folder, Launchpad, or Spotlight.</p>
  <p>Thanks for installing &mdash; happy listening.</p>
  <p class="muted">Report issues at <a href="https://github.com/bretth18/seeleseek/issues">github.com/bretth18/seeleseek/issues</a>.</p>
</body>
</html>
